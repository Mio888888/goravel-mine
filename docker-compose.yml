version: '3'

services:
  goravel:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: http://localhost:3000
      APP_HOST: 0.0.0.0
      APP_PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-}
      CACHE_STORE: redis
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: goravel-mine
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_SCHEMA: public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    volumes:
      - app-storage:/www/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: always

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: goravel-mine
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d goravel-mine"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: always

volumes:
  app-storage:
  postgres-data:
