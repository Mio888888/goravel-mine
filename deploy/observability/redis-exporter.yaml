apiVersion: v1
kind: Secret
metadata:
  name: redis-exporter-secret
  namespace: goravel-mine
type: Opaque
stringData:
  REDIS_ADDR: "redis://redis:6379"
  REDIS_PASSWORD: "replace-with-redis-password"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: goravel-mine
  labels:
    app.kubernetes.io/name: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-exporter
    spec:
      containers:
        - name: exporter
          image: oliver006/redis_exporter:v1.62.0
          ports:
            - name: metrics
              containerPort: 9121
          envFrom:
            - secretRef:
                name: redis-exporter-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: goravel-mine
  labels:
    app.kubernetes.io/name: redis-exporter
spec:
  selector:
    app.kubernetes.io/name: redis-exporter
  ports:
    - name: metrics
      port: 9121
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-exporter
  namespace: goravel-mine
  labels:
    app.kubernetes.io/name: redis-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-exporter
  namespaceSelector:
    matchNames:
      - goravel-mine
  endpoints:
    - port: metrics
      interval: 30s
