route:
  receiver: default-ticket
  group_by:
    - service
    - slo
    - alertname
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - service="goravel-mine"
        - severity="page"
      receiver: goravel-mine-on-call
      group_wait: 15s
      repeat_interval: 30m
      continue: false
    - matchers:
        - service="goravel-mine"
        - severity="ticket"
      receiver: goravel-mine-ticket
      repeat_interval: 12h
      continue: false

receivers:
  - name: default-ticket
    webhook_configs:
      - url: https://alerts.example.com/default
        send_resolved: true

  - name: goravel-mine-on-call
    webhook_configs:
      - url: https://alerts.example.com/on-call
        send_resolved: true
        http_config:
          follow_redirects: true

  - name: goravel-mine-ticket
    webhook_configs:
      - url: https://alerts.example.com/ticket
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - service="goravel-mine"
      - alertname="GoravelMineNoMetricsScrape"
    target_matchers:
      - service="goravel-mine"
      - severity="ticket"
    equal:
      - service
