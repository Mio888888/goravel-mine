apiVersion: batch/v1
kind: Job
metadata:
  name: goravel-mine-migrate
  namespace: goravel-mine
  labels:
    app.kubernetes.io/name: goravel-mine
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: goravel-mine
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      initContainers:
        - name: init-storage
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /storage/app/public/uploads /storage/framework/cache /storage/framework/sessions /storage/framework/views /storage/logs /storage/scripts"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: storage
              mountPath: /storage
      containers:
        - name: migrate
          image: ghcr.io/example/goravel-mine:0.1.0
          command: ["/www/main", "artisan", "migration:safe", "--scope=all", "--lock-timeout=30s"]
          envFrom:
            - configMapRef:
                name: goravel-mine-config
            - secretRef:
                name: goravel-mine-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: storage
              mountPath: /www/storage
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: goravel-mine-storage
        - name: tmp
          emptyDir: {}
