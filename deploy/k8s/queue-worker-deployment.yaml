apiVersion: apps/v1
kind: Deployment
metadata:
  name: goravel-mine-queue-worker
  namespace: goravel-mine
  labels:
    app.kubernetes.io/name: goravel-mine
    app.kubernetes.io/component: queue-worker
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: goravel-mine
      app.kubernetes.io/component: queue-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: goravel-mine
        app.kubernetes.io/component: queue-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      initContainers:
        - name: init-storage
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /storage/app/public/uploads /storage/framework/cache /storage/framework/sessions /storage/framework/views /storage/logs /storage/scripts"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: storage
              mountPath: /storage
      containers:
        - name: queue-worker
          image: ghcr.io/example/goravel-mine:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: QUEUE_WORKER_ENABLED
              value: "true"
            - name: QUEUE_CONCURRENT
              value: "4"
            - name: QUEUE_OUTBOX_ENABLED
              value: "true"
            - name: QUEUE_OUTBOX_OWNER
              value: "queue-outbox-runner"
            - name: APP_AUTO_RUN
              value: "false"
            - name: SCHEDULER_ENABLED
              value: "false"
          envFrom:
            - configMapRef:
                name: goravel-mine-config
            - secretRef:
                name: goravel-mine-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: storage
              mountPath: /www/storage
            - name: tmp
              mountPath: /tmp
      terminationGracePeriodSeconds: 60
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: goravel-mine-storage
        - name: tmp
          emptyDir: {}
