replicaCount: 3

ha:
  enabled: true
  serviceAccountName: goravel-mine
  priorityClassName: production-workload
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 80
    scaleDownStabilizationWindowSeconds: 300
  pdb:
    enabled: true
    minAvailable: 2
  topology:
    enabled: true
    webAntiAffinity: required
  networkPolicy:
    enabled: true
    ingress:
      enabled: true
    metrics:
      enabled: true
    destinations:
      postgresql:
        cidrs:
          - 192.0.2.10/32
      redis:
        cidrs:
          - 192.0.2.20/32
      objectStorage:
        enabled: true
        cidrs:
          - 203.0.113.0/24
      sso:
        enabled: true
        cidrs:
          - 198.51.100.0/24

migration:
  enabled: true
  hook: false

backup:
  enabled: true
  s3Bucket: goravel-mine-test-backups
  kmsKeyId: alias/goravel-mine-test
  releaseGitSha: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  releaseImageDigest: sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb

restoreDrill:
  targetNamespace: goravel-mine-restore-ci
  targetDatabaseHost: postgres-restore
  targetDatabase: goravel_mine_restore_ci
