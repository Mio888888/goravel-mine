{{- if and .Values.ha.enabled .Values.ha.hpa.enabled }}
{{- if gt (int .Values.ha.hpa.minReplicas) (int .Values.ha.hpa.maxReplicas) }}
{{- fail "ha.hpa.minReplicas must not exceed ha.hpa.maxReplicas" }}
{{- end }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "goravel-mine.fullname" . }}
  labels:
    {{- include "goravel-mine.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "goravel-mine.fullname" . }}
  minReplicas: {{ .Values.ha.hpa.minReplicas }}
  maxReplicas: {{ .Values.ha.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.ha.hpa.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.ha.hpa.targetMemoryUtilizationPercentage }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.ha.hpa.scaleDownStabilizationWindowSeconds }}
{{- end }}
