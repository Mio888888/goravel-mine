apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "goravel-mine.fullname" . }}
  labels:
    {{- include "goravel-mine.labels" . | nindent 4 }}
    {{- if .Values.ha.enabled }}
    app.kubernetes.io/component: web
    {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.rollingUpdate.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "goravel-mine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "goravel-mine.selectorLabels" . | nindent 8 }}
        release-git-sha: {{ .Values.releaseGitSha | quote }}
        {{- if .Values.ha.enabled }}
        app.kubernetes.io/component: web
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.secret.create }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.ha.enabled .Values.ha.serviceAccountName }}
      serviceAccountName: {{ .Values.ha.serviceAccountName }}
      {{- end }}
      {{- if and .Values.ha.enabled .Values.ha.priorityClassName }}
      priorityClassName: {{ .Values.ha.priorityClassName }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if and .Values.ha.enabled .Values.ha.topology.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.ha.topology.maxSkew }}
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: {{ .Values.ha.topology.zoneWhenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "goravel-mine.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: web
        - maxSkew: {{ .Values.ha.topology.maxSkew }}
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: {{ .Values.ha.topology.hostnameWhenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "goravel-mine.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: web
      affinity:
        podAntiAffinity:
          {{- if eq .Values.ha.topology.webAntiAffinity "required" }}
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "goravel-mine.selectorLabels" . | nindent 18 }}
                  app.kubernetes.io/component: web
              topologyKey: kubernetes.io/hostname
          {{- else }}
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "goravel-mine.selectorLabels" . | nindent 20 }}
                    app.kubernetes.io/component: web
                topologyKey: kubernetes.io/hostname
          {{- end }}
      {{- end }}
      initContainers:
        - name: init-storage
          image: {{ .Values.storageInit.image | quote }}
          command:
            {{- toYaml .Values.storageInit.command | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
            {{- if .Values.ha.enabled }}
            privileged: false
            {{- end }}
          {{- if .Values.ha.enabled }}
          resources:
            {{- toYaml .Values.storageInit.resources | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: storage
              mountPath: /storage
      containers:
        - name: app
          image: {{ include "goravel-mine.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          {{- if eq (toString (index .Values.app.env "OBS_METRICS_ENABLED")) "true" }}
          env:
            - name: RELEASE_GIT_SHA
              value: {{ .Values.releaseGitSha | quote }}
            - name: OBS_METRICS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "goravel-mine.secretName" . }}
                  key: OBS_METRICS_TOKEN
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "goravel-mine.fullname" . }}-config
            - secretRef:
                name: {{ include "goravel-mine.secretName" . }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
            {{- if .Values.ha.enabled }}
            privileged: false
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: storage
              mountPath: /www/storage
            - name: tmp
              mountPath: /tmp
      terminationGracePeriodSeconds: 30
      volumes:
        - name: storage
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "goravel-mine.storageClaimName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
