apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "goravel-mine.fullname" . }}-config
  labels:
    {{- include "goravel-mine.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.app.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- range $key, $value := .Values.app.extraEnv }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
